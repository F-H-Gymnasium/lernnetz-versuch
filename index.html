<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LernNetz - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="login-view" class="login-wrapper">
        <div class="login-card">
            <div class="login-header">
                <h1>Lern<span>Netz</span></h1>
                <p>Die digitale Schulplattform</p>
            </div>
            
            <div class="form-group">
                <label for="email">E-Mail-Adresse</label>
                <input type="email" id="email" placeholder="name@schule.de" required>
            </div>
            
            <div class="form-group">
                <label for="password">Passwort</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            
            <div class="button-group">
                <button id="loginBtn" class="btn-primary">Einloggen</button>
            </div>
            
            <p id="message" class="message-box"></p>
        </div>
    </div>

    <div id="dashboard-view" class="dashboard-wrapper hidden">
        <header class="main-header">
            <h2>Willkommen im LernNetz!</h2>
            <button id="logoutBtn" class="btn-danger">Ausloggen</button>
        </header>
        <main>
            <p>Erfolgreich angemeldet. Hier entstehen bald deine Module!</p>
        </main>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
